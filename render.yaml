services:
  - type: web
    name: aether-ai-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: https://krutimwork.web.app,https://krutimwork.firebaseapp.com
        # Firebase Hosting URLs are also auto-allowed by server.ts CORS pattern.
        # Add custom domains here if needed (e.g. https://yourdomain.com).
      - key: TYPHOON_API_URL
        value: https://api.opentyphoon.ai/v1/chat/completions
      - key: TYPHOON_API_KEY
        sync: false
