version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: aether_ai
      DB_USER: aether
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your shell or .env}
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: aether_ai
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your shell or .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
volumes:
  pgdata:
