version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL:?Required}
      SUPABASE_KEY: ${SUPABASE_KEY:?Required}
      TYPHOON_API_KEY: ${TYPHOON_API_KEY:?Required}
      TYPHOON_API_URL: ${TYPHOON_API_URL:-https://api.opentyphoon.ai/v1/chat/completions}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    restart: unless-stopped
